spring.application.name=student
# DataSource configuration for PostgreSQL
#
# In Render, set DB_HOST to the full Postgres connection URL, e.g.
#   postgresql://USER:PASSWORD@HOST:PORT/DATABASE
# This property then turns it into a proper JDBC URL for the driver:
spring.datasource.url=jdbc:${DB_HOST:postgresql://localhost:5432/db_song}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA/Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect fallback: avoids 'Unable to determine Dialect without JDBC metadata' when metadata can't be read
# (note: you still need a working DB connection)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
# Render provides PORT; default to 8080 for local
server.port=${PORT:8080}

# ---- HikariCP ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000