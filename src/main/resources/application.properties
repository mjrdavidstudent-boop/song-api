spring.application.name=song
# DataSource configuration for PostgreSQL
#
# In Render, DATABASE_URL is provided by the database binding.
# Locally, the host-based defaults point to a PostgreSQL instance on localhost.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_song}}
spring.datasource.username=${DB_USERNAME:${USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${PASSWORD:admin}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA/Hibernate ----
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Server ----
# Render provides PORT; default to 8080 for local
server.port=${PORT:8080}

# ---- HikariCP ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000